<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Electoral Loreto</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --dark:#0f172a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header{
      background:var(--dark);
      color:#fff;
      padding:18px 24px;
    }
    header h1{
      margin:0;
      font-size:1.5rem;
    }
    header p{
      margin:6px 0 0;
      color:#cbd5e1;
    }
    .container{
      max-width:1300px;
      margin:0 auto;
      padding:20px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:16px;
      box-shadow:0 2px 6px rgba(0,0,0,.04);
    }
    .controls{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-bottom:16px;
    }
    label{
      display:block;
      font-weight:bold;
      margin-bottom:6px;
    }
    select{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid var(--border);
      background:#fff;
    }
    .kpis{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:12px;
      margin-bottom:16px;
    }
    .kpi{
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
    }
    .kpi small{
      display:block;
      color:var(--muted);
      margin-bottom:4px;
    }
    .kpi strong{
      font-size:1.2rem;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    .wide{
      grid-column:1 / -1;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:.95rem;
    }
    th,td{
      padding:8px;
      border-bottom:1px solid var(--border);
      text-align:left;
    }
    th{
      background:#f8fafc;
    }
    .loading, .error{
      margin:16px 0;
      padding:12px 14px;
      border-radius:10px;
      font-weight:bold;
    }
    .loading{
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
    }
    .error{
      background:#fef2f2;
      color:#b91c1c;
      border:1px solid #fecaca;
      display:none;
    }
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard Electoral de Loreto</h1>
    <p>Senado y Diputados por ámbito regional, provincial y distrital</p>
  </header>

  <div class="container">
    <div id="loadingBox" class="loading">Cargando datos...</div>
    <div id="errorBox" class="error"></div>

    <div class="controls card">
      <div>
        <label for="tipoSelect">Elección</label>
        <select id="tipoSelect" disabled>
          <option value="senado">Senado</option>
          <option value="diputados">Diputados</option>
        </select>
      </div>
      <div>
        <label for="provinciaSelect">Provincia</label>
        <select id="provinciaSelect" disabled>
          <option value="">Todas</option>
        </select>
      </div>
      <div>
        <label for="distritoSelect">Distrito</label>
        <select id="distritoSelect" disabled>
          <option value="">Todos</option>
        </select>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi"><small>Ámbito actual</small><strong id="kpiAmbito">-</strong></div>
      <div class="kpi"><small>Total votos</small><strong id="kpiVotos">-</strong></div>
      <div class="kpi"><small>Agrupaciones</small><strong id="kpiAgrup">-</strong></div>
      <div class="kpi"><small>Ganador</small><strong id="kpiGanador">-</strong></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Ranking de agrupaciones</h2>
        <canvas id="rankingChart"></canvas>
      </div>
      <div class="card">
        <h2>Participación relativa</h2>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="card wide">
        <h2>Tabla resumen</h2>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Agrupación</th>
              <th>Votos</th>
              <th>%</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let dataStore = {
      senado: [],
      diputados: []
    };

    const tipoSelect = document.getElementById("tipoSelect");
    const provinciaSelect = document.getElementById("provinciaSelect");
    const distritoSelect = document.getElementById("distritoSelect");
    const tablaBody = document.getElementById("tablaBody");
    const kpiAmbito = document.getElementById("kpiAmbito");
    const kpiVotos = document.getElementById("kpiVotos");
    const kpiAgrup = document.getElementById("kpiAgrup");
    const kpiGanador = document.getElementById("kpiGanador");
    const loadingBox = document.getElementById("loadingBox");
    const errorBox = document.getElementById("errorBox");

    let rankingChart = null;
    let pieChart = null;

    function mostrarError(msg) {
      errorBox.style.display = "block";
      errorBox.textContent = msg;
      loadingBox.style.display = "none";
    }

    function ocultarError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function habilitarControles() {
      tipoSelect.disabled = false;
      provinciaSelect.disabled = false;
      distritoSelect.disabled = false;
    }

    function getDataActual() {
      return dataStore[tipoSelect.value] || [];
    }

    function poblarProvincias() {
      const data = getDataActual();
      const provincias = [...new Set(data.map(x => x.provincia))].filter(Boolean).sort();

      provinciaSelect.innerHTML = '<option value="">Todas</option>';
      provincias.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p;
        opt.textContent = p;
        provinciaSelect.appendChild(opt);
      });

      poblarDistritos();
    }

    function poblarDistritos() {
      const data = getDataActual();
      const provincia = provinciaSelect.value;

      const filtrado = provincia ? data.filter(x => x.provincia === provincia) : data;
      const distritos = [...new Set(filtrado.map(x => x.distrito))].filter(Boolean).sort();

      distritoSelect.innerHTML = '<option value="">Todos</option>';
      distritos.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = d;
        distritoSelect.appendChild(opt);
      });
    }

    function filtrarData() {
      let data = getDataActual();
      if (provinciaSelect.value) data = data.filter(x => x.provincia === provinciaSelect.value);
      if (distritoSelect.value) data = data.filter(x => x.distrito === distritoSelect.value);
      return data;
    }

    function resumirPorAgrupacion(data) {
      const resumen = {};
      data.forEach(row => {
        const agrup = String(row.agrupacion || "").trim();
        const votos = Number(row.votos || 0);
        if (!agrup) return;
        resumen[agrup] = (resumen[agrup] || 0) + votos;
      });

      return Object.entries(resumen)
        .map(([agrupacion, votos]) => ({ agrupacion, votos }))
        .sort((a, b) => b.votos - a.votos);
    }

    function actualizarKPIs(resumen) {
      const total = resumen.reduce((acc, x) => acc + x.votos, 0);
      const ganador = resumen.length ? resumen[0].agrupacion : "-";

      let ambito = "Loreto";
      if (provinciaSelect.value) ambito = provinciaSelect.value;
      if (distritoSelect.value) ambito = distritoSelect.value;

      kpiAmbito.textContent = ambito;
      kpiVotos.textContent = total.toLocaleString("es-PE");
      kpiAgrup.textContent = resumen.length.toLocaleString("es-PE");
      kpiGanador.textContent = ganador;
    }

    function actualizarTabla(resumen) {
      const total = resumen.reduce((acc, x) => acc + x.votos, 0);
      tablaBody.innerHTML = "";

      resumen.forEach((row, idx) => {
        const tr = document.createElement("tr");
        const pct = total ? ((row.votos / total) * 100).toFixed(2) : "0.00";
        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${row.agrupacion}</td>
          <td>${row.votos.toLocaleString("es-PE")}</td>
          <td>${pct}%</td>
        `;
        tablaBody.appendChild(tr);
      });
    }

    function actualizarCharts(resumenCompleto) {
      const resumen = resumenCompleto.slice(0, 10);
      const labels = resumen.map(x => x.agrupacion);
      const values = resumen.map(x => x.votos);

      if (rankingChart) rankingChart.destroy();
      if (pieChart) pieChart.destroy();

      rankingChart = new Chart(document.getElementById("rankingChart"), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "Votos",
            data: values
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: { beginAtZero: true }
          }
        }
      });

      pieChart = new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
          labels,
          datasets: [{
            data: values
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: "bottom" }
          }
        }
      });
    }

    function render() {
      const data = filtrarData();
      const resumen = resumirPorAgrupacion(data);

      actualizarKPIs(resumen);
      actualizarTabla(resumen);
      actualizarCharts(resumen);
    }

    async function cargarJsonSeguro(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`No se pudo cargar ${url} (HTTP ${res.status})`);
      }
      return await res.json();
    }

    async function cargarDatos() {
      try {
        ocultarError();
        loadingBox.style.display = "block";
        loadingBox.textContent = "Cargando datos...";

        const [senadoData, diputadosData] = await Promise.all([
          cargarJsonSeguro("senado_dashboard.json"),
          cargarJsonSeguro("diputados_dashboard.json")
        ]);

        dataStore.senado = Array.isArray(senadoData) ? senadoData : [];
        dataStore.diputados = Array.isArray(diputadosData) ? diputadosData : [];

        if (!dataStore.senado.length && !dataStore.diputados.length) {
          throw new Error("Los JSON están vacíos o no tienen el formato esperado.");
        }

        poblarProvincias();
        render();
        habilitarControles();

        loadingBox.style.display = "none";
        console.log("Datos cargados correctamente");
      } catch (err) {
        console.error(err);
        mostrarError(
          "No se pudieron cargar los archivos JSON. Verifica que 'senado_dashboard.json' y 'diputados_dashboard.json' estén en la misma carpeta que index.html y que GitHub Pages esté activado."
        );
      }
    }

    tipoSelect.addEventListener("change", () => {
      poblarProvincias();
      render();
    });

    provinciaSelect.addEventListener("change", () => {
      poblarDistritos();
      render();
    });

    distritoSelect.addEventListener("change", render);

    cargarDatos();
  </script>
</body>
</html>
